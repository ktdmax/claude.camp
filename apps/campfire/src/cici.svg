<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 54">
  <!-- Cici idle state — 7x9 grid, 6x6 per pixel -->
  <!-- Row 1: head top -->
  <rect x="6" y="0" width="6" height="6" fill="#E8572A"/>
  <rect x="12" y="0" width="6" height="6" fill="#E8572A"/>
  <rect x="18" y="0" width="6" height="6" fill="#E8572A"/>
  <rect x="24" y="0" width="6" height="6" fill="#E8572A"/>
  <rect x="30" y="0" width="6" height="6" fill="#E8572A"/>
  <!-- Row 2: eyes -->
  <rect x="0" y="6" width="6" height="6" fill="#E8572A"/>
  <rect x="12" y="6" width="6" height="6" fill="#1A1A2E"/>
  <rect x="24" y="6" width="6" height="6" fill="#1A1A2E"/>
  <rect x="36" y="6" width="6" height="6" fill="#E8572A"/>
  <!-- Row 3: mouth -->
  <rect x="6" y="12" width="6" height="6" fill="#E8572A"/>
  <rect x="18" y="12" width="6" height="6" fill="#1A1A2E"/>
  <rect x="30" y="12" width="6" height="6" fill="#E8572A"/>
  <!-- Row 4: chin -->
  <rect x="12" y="18" width="6" height="6" fill="#E8572A"/>
  <rect x="18" y="18" width="6" height="6" fill="#E8572A"/>
  <rect x="24" y="18" width="6" height="6" fill="#E8572A"/>
  <!-- Row 5: body -->
  <rect x="6" y="24" width="6" height="6" fill="#E8572A"/>
  <rect x="12" y="24" width="6" height="6" fill="#E8572A"/>
  <rect x="18" y="24" width="6" height="6" fill="#E8572A"/>
  <rect x="24" y="24" width="6" height="6" fill="#E8572A"/>
  <rect x="30" y="24" width="6" height="6" fill="#E8572A"/>
</svg>
