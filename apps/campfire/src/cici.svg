<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 55">
  <!-- Cici idle — 9x11 grid, 5x5 per pixel -->
  <!-- Row 0: flame tip -->
  <rect x="20" y="0" width="5" height="5" fill="#FF7B4A"/>
  <!-- Row 1: head top -->
  <rect x="10" y="5" width="5" height="5" fill="#E8572A"/>
  <rect x="15" y="5" width="5" height="5" fill="#E8572A"/>
  <rect x="20" y="5" width="5" height="5" fill="#E8572A"/>
  <rect x="25" y="5" width="5" height="5" fill="#E8572A"/>
  <rect x="30" y="5" width="5" height="5" fill="#E8572A"/>
  <!-- Row 2: eyes -->
  <rect x="5" y="10" width="5" height="5" fill="#E8572A"/>
  <rect x="10" y="10" width="5" height="5" fill="#E8572A"/>
  <rect x="15" y="10" width="5" height="5" fill="#1A1A2E"/>
  <rect x="20" y="10" width="5" height="5" fill="#E8572A"/>
  <rect x="25" y="10" width="5" height="5" fill="#1A1A2E"/>
  <rect x="30" y="10" width="5" height="5" fill="#E8572A"/>
  <rect x="35" y="10" width="5" height="5" fill="#E8572A"/>
  <!-- Row 3: mouth -->
  <rect x="10" y="15" width="5" height="5" fill="#E8572A"/>
  <rect x="15" y="15" width="5" height="5" fill="#E8572A"/>
  <rect x="20" y="15" width="5" height="5" fill="#E8572A"/>
  <rect x="25" y="15" width="5" height="5" fill="#E8572A"/>
  <rect x="30" y="15" width="5" height="5" fill="#E8572A"/>
  <!-- Row 4: neck -->
  <rect x="15" y="20" width="5" height="5" fill="#E8572A"/>
  <rect x="20" y="20" width="5" height="5" fill="#E8572A"/>
  <rect x="25" y="20" width="5" height="5" fill="#E8572A"/>
  <!-- Row 5: shoulders -->
  <rect x="10" y="25" width="5" height="5" fill="#E8572A"/>
  <rect x="15" y="25" width="5" height="5" fill="#E8572A"/>
  <rect x="20" y="25" width="5" height="5" fill="#E8572A"/>
  <rect x="25" y="25" width="5" height="5" fill="#E8572A"/>
  <rect x="30" y="25" width="5" height="5" fill="#E8572A"/>
  <!-- Row 6: torso -->
  <rect x="10" y="30" width="5" height="5" fill="#E8572A"/>
  <rect x="15" y="30" width="5" height="5" fill="#E8572A"/>
  <rect x="20" y="30" width="5" height="5" fill="#FF7B4A"/>
  <rect x="25" y="30" width="5" height="5" fill="#E8572A"/>
  <rect x="30" y="30" width="5" height="5" fill="#E8572A"/>
  <!-- Row 7: hips -->
  <rect x="15" y="35" width="5" height="5" fill="#E8572A"/>
  <rect x="20" y="35" width="5" height="5" fill="#E8572A"/>
  <rect x="25" y="35" width="5" height="5" fill="#E8572A"/>
  <!-- Row 8: legs -->
  <rect x="15" y="40" width="5" height="5" fill="#E8572A"/>
  <rect x="25" y="40" width="5" height="5" fill="#E8572A"/>
  <!-- Row 9: feet -->
  <rect x="10" y="45" width="5" height="5" fill="#E8572A"/>
  <rect x="30" y="45" width="5" height="5" fill="#E8572A"/>
</svg>
