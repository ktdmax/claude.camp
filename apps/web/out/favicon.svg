<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0D0D1A"/>
  <!-- Head top -->
  <rect x="8" y="4" width="4" height="4" fill="#E8572A"/>
  <rect x="12" y="4" width="4" height="4" fill="#E8572A"/>
  <rect x="16" y="4" width="4" height="4" fill="#E8572A"/>
  <rect x="20" y="4" width="4" height="4" fill="#E8572A"/>
  <!-- Eyes row -->
  <rect x="4" y="8" width="4" height="4" fill="#E8572A"/>
  <rect x="12" y="8" width="4" height="4" fill="#F5F0E8"/>
  <rect x="20" y="8" width="4" height="4" fill="#F5F0E8"/>
  <rect x="28" y="8" width="4" height="4" fill="#E8572A"/>
  <!-- Mouth row -->
  <rect x="8" y="12" width="4" height="4" fill="#E8572A"/>
  <rect x="16" y="12" width="4" height="4" fill="#1A1A2E"/>
  <rect x="24" y="12" width="4" height="4" fill="#E8572A"/>
  <!-- Chin -->
  <rect x="12" y="16" width="4" height="4" fill="#E8572A"/>
  <rect x="16" y="16" width="4" height="4" fill="#E8572A"/>
  <rect x="20" y="16" width="4" height="4" fill="#E8572A"/>
  <!-- Body -->
  <rect x="8" y="20" width="4" height="4" fill="#E8572A"/>
  <rect x="12" y="20" width="4" height="4" fill="#E8572A"/>
  <rect x="16" y="20" width="4" height="4" fill="#E8572A"/>
  <rect x="20" y="20" width="4" height="4" fill="#E8572A"/>
  <rect x="24" y="20" width="4" height="4" fill="#E8572A"/>
  <!-- Legs -->
  <rect x="8" y="24" width="4" height="4" fill="#E8572A"/>
  <rect x="12" y="24" width="4" height="4" fill="#E8572A"/>
  <rect x="16" y="24" width="4" height="4" fill="#E8572A"/>
  <rect x="20" y="24" width="4" height="4" fill="#E8572A"/>
  <rect x="24" y="24" width="4" height="4" fill="#E8572A"/>
